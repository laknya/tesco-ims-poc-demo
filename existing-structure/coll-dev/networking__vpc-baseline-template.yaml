AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  COLL-DEV VPC - Collaboration Development Account (OLD STRUCTURE).
  One of 68 near-identical per-account copies. Problem: changing a tag
  requires editing 68 files; missing one causes inconsistency.
  The new-structure master template replaces all copies.

Parameters:
  AccountId:
    Type: String
    Default: "111222333444"      # hardcoded per file

  Environment:
    Type: String
    Default: "dev"               # hardcoded per file

  VpcCidr:
    Type: String
    Default: "10.1.0.0/16"      # hardcoded per file

  VpcName:
    Type: String
    Default: "coll-dev-vpc"     # hardcoded per file

  EnableDnsHostnames:
    Type: String
    Default: "true"              # duplicated in all 68 files

  EnableDnsSupport:
    Type: String
    Default: "true"              # duplicated in all 68 files

  PublicSubnetACidr:
    Type: String
    Default: "10.1.1.0/24"     # duplicated (only 3rd octet differs per account)

  PublicSubnetBCidr:
    Type: String
    Default: "10.1.2.0/24"     # duplicated

  PrivateSubnetACidr:
    Type: String
    Default: "10.1.10.0/24"    # duplicated

  PrivateSubnetBCidr:
    Type: String
    Default: "10.1.11.0/24"    # duplicated

  CostCentre:
    Type: String
    Default: "TESCO-IMS-PLATFORM"  # duplicated in all 68 files

  ManagedBy:
    Type: String
    Default: "github-actions"      # duplicated in all 68 files

Resources:
  VPC:
    Type: AWS::EC2::VPC
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: !Ref EnableDnsHostnames
      EnableDnsSupport: !Ref EnableDnsSupport
      Tags:
        - Key: Name
          Value: !Ref VpcName
        - Key: Environment
          Value: !Ref Environment
        - Key: CostCentre
          Value: !Ref CostCentre
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: AccountId
          Value: !Ref AccountId

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-igw"
        - Key: Environment
          Value: !Ref Environment

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-public-a"
        - Key: Tier
          Value: public
        - Key: Environment
          Value: !Ref Environment

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-public-b"
        - Key: Tier
          Value: public
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-private-a"
        - Key: Tier
          Value: private
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-private-b"
        - Key: Tier
          Value: private
        - Key: Environment
          Value: !Ref Environment

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${VpcName}-public-rt"
        - Key: Environment
          Value: !Ref Environment

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"
  VpcCidr:
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub "${AWS::StackName}-VpcCidr"
  InternetGatewayId:
    Value: !Ref InternetGateway
    Export:
      Name: !Sub "${AWS::StackName}-IgwId"
  PublicSubnetAId:
    Value: !Ref PublicSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetAId"
  PublicSubnetBId:
    Value: !Ref PublicSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetBId"
  PrivateSubnetAId:
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetAId"
  PrivateSubnetBId:
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetBId"
