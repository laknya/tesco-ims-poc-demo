name: TESCO IMS Migration -- Stage 4 Cutover

# -- Protection layers for this destructive action -----------------------------
#
#   Layer 1 -- Manual trigger only (workflow_dispatch, never automatic)
#   Layer 2 -- Typed confirmation input: must enter exactly "CUTOVER"
#   Layer 3 -- Environment gate: tesco-ims-cutover reviewer must click "Approve and deploy"
#   Layer 4 -- Pre-flight parity check inside stage4-cutover.sh must pass 100%
#
# If any layer fails the job exits -- existing stacks are never touched.
# -----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Safety check -- type CUTOVER to proceed'
        required: true
        type: string
      account:
        description: 'Account to cut over'
        required: false
        default: 'dev'
        type: choice
        options: ['dev']

env:
  AWS_REGION: eu-west-1

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:

  cutover:
    name: Stage 4 -- Cutover (retire existing stacks, new stacks canonical)
    runs-on: ubuntu-latest
    environment:
      name: tesco-ims-cutover
      url: https://eu-west-1.console.aws.amazon.com/cloudformation/home?region=eu-west-1#/stacks

    steps:
      # Layer 2: validate typed confirmation before doing anything
      - name: Validate confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "CUTOVER" ]; then
            echo "[FAIL]  Input must be exactly 'CUTOVER' -- received: '${{ inputs.confirm }}'"
            echo "    Re-run the workflow and type CUTOVER in the confirmation field."
            exit 1
          fi
          echo "[OK]  Confirmation input validated"

      - uses: actions/checkout@v4

      - name: Install tools
        run: pip install boto3 pyyaml -q

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tesco-ims-migration-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      # Layer 4: pre-flight parity check is baked into stage4-cutover.sh.
      # CI=true (set automatically by GitHub) skips the interactive read -p prompt.
      - name: Execute cutover -- dev (pre-flight parity check + delete existing stacks)
        run: bash scripts/stage4-cutover.sh ${{ inputs.account }}
