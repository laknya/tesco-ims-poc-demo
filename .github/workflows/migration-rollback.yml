name: TESCO IMS Migration — Stage 5 Rollback

# ── Emergency recovery workflow ────────────────────────────────────────────────
#
#   Use this to undo a cutover or recover from a failed deployment.
#   What it does:
#     1. Restores poc-EXISTING-vpc-dev and poc-EXISTING-kms-dev from existing-structure/ templates
#     2. Deletes poc-NEW-vpc-dev and poc-NEW-kms-dev
#
#   Protection layers:
#     Layer 1 — Manual trigger only (workflow_dispatch)
#     Layer 2 — Typed confirmation: must enter exactly "ROLLBACK"
#     Layer 3 — Environment gate: tesco-ims-rollback reviewer must approve
#
#   --no-fail-on-empty-changeset on both restores:
#   Safe to run whether or not existing stacks still exist.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Safety check — type ROLLBACK to proceed'
        required: true
        type: string
      account:
        description: 'Account to roll back'
        required: false
        default: 'dev'
        type: choice
        options: ['dev']

env:
  AWS_REGION: eu-west-1

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:

  rollback:
    name: Stage 5 — Rollback (restore existing stacks, remove new stacks)
    runs-on: ubuntu-latest
    environment:
      name: tesco-ims-rollback
      url: https://eu-west-1.console.aws.amazon.com/cloudformation/home?region=eu-west-1#/stacks

    steps:
      # Layer 2: validate typed confirmation before doing anything
      - name: Validate confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "ROLLBACK" ]; then
            echo "❌  Input must be exactly 'ROLLBACK' — received: '${{ inputs.confirm }}'"
            echo "    Re-run the workflow and type ROLLBACK in the confirmation field."
            exit 1
          fi
          echo "✅  Confirmation input validated"

      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tesco-ims-migration-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      # CI=true (set automatically by GitHub) skips the interactive read -p prompt.
      - name: Execute rollback — dev (restore existing stacks, delete new stacks)
        run: bash scripts/stage5-rollback.sh ${{ inputs.account }}
