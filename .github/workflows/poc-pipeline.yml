name: TESCO IMS POC Pipeline
# Repo: git@github.com:laknya/tesco-ims-poc-demo.git

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:

  validate:
    name: 01 Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: pip install cfn-lint boto3

      - name: Lint old templates
        run: |
          cfn-lint old-structure/cloudformation/vpc-template.yaml
          cfn-lint old-structure/cloudformation/subnets-template.yaml

      - name: Lint new centralized module
        run: |
          cfn-lint new-structure/modules/networking/vpc-subnets/template.yaml

      - name: Validate all JSON parameter files
        run: |
          find . -name "*.json" -not -path "./.git/*" | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              && echo "  ✅ $f" || { echo "  ❌ $f"; exit 1; }
          done

      - name: Test resolver — dev
        run: |
          python3 new-structure/pipeline/resolve_parameters.py \
            --env dev --domain networking --module vpc-subnets \
            --output /tmp/resolved-dev.json
          echo "Dev params:"; cat /tmp/resolved-dev.json

      - name: Test resolver — prod
        run: |
          python3 new-structure/pipeline/resolve_parameters.py \
            --env prod --domain networking --module vpc-subnets \
            --output /tmp/resolved-prod.json
          echo "Prod params:"; cat /tmp/resolved-prod.json

  deploy-old:
    name: 02 Deploy OLD (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tesco-ims-poc-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy old structure — dev
        run: bash scripts/stage1-deploy-old.sh dev

  deploy-new:
    name: 03 Deploy NEW (dev)
    runs-on: ubuntu-latest
    needs: deploy-old
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: pip install cfn-lint boto3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tesco-ims-poc-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy new centralized module — dev
        run: bash scripts/stage2-deploy-new.sh dev

  parity-check:
    name: 04 Parity Check (dev)
    runs-on: ubuntu-latest
    needs: deploy-new
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: pip install boto3

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/tesco-ims-poc-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run parity validation — dev
        run: bash scripts/stage3-validate-parity.sh dev

      - name: Post result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const icon   = status === 'success' ? '✅' : '❌';
            const msg    = status === 'success'
              ? 'Parity validated — safe to proceed to cutover'
              : 'Parity FAILED — do not cut over';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## TESCO IMS POC — Parity Check\n${icon} **${msg}**\n\nRun \`scripts/stage4-cutover.sh dev\` locally when ready.`
            });