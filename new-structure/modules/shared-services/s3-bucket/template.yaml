AWSTemplateFormatVersion: '2010-09-09'
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3005   # DependsOn: S3Bucket on S3BucketPolicy is explicit for demo readability (redundant but self-documenting)
Description: >-
  TESCO IMS - S3 Bucket (centralized module). Replaces per-account copies.
  Bucket policy principals (BucketAdminArn, BucketWriterArn) are parameters.
  Security team owns accounts/{account}/shared-services/s3-bucket.json.
  Platform team owns this template. No cross-team template edits needed.

Parameters:
  AccountId:
    Type: String
  Environment:
    Type: String
  BucketName:
    Type: String
  BucketAdminArn:
    Type: String
    Description: IAM ARN granted full s3:* on this bucket (security team config)
  BucketWriterArn:
    Type: String
    Description: IAM ARN granted read/write on this bucket (security team config)
  EnableVersioning:
    Type: String
    AllowedValues: [Enabled, Suspended]
  LifecycleRetentionDays:
    Type: Number
    Description: Days to retain noncurrent object versions before expiry
  CostCentre:
    Type: String
  ManagedBy:
    Type: String
  VpcStackName:
    Type: String
    Description: >-
      Name of the VPC stack whose VpcId is imported via Fn::ImportValue.
      Used in the DenyNonVpcAccess bucket policy statement so that S3 only
      accepts requests originating from the account VPC.
      Supplied per-account via accounts/{account}/shared-services/s3-bucket.json
      -- the 4-layer resolver provides the correct stack name automatically.

  KmsStackName:
    Type: String
    Description: >-
      Name of the KMS stack that must exist before this stack deploys.
      The CI deploy script detects any parameter ending in StackName and
      waits for that stack to reach CREATE_COMPLETE before proceeding.
      This ensures the KMS key alias referenced by KmsKeyArn exists at
      deploy time and passes AWS::EarlyValidation::ResourceExistenceCheck.
      Supplied per-account via accounts/{account}/shared-services/s3-bucket.json.

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub "${KmsStackName}-KeyArn"
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref LifecycleRetentionDays
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: !Ref Environment
        - Key: CostCentre
          Value: !Ref CostCentre
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: AccountId
          Value: !Ref AccountId

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: S3Bucket
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AdminAccess
            Effect: Allow
            Principal:
              AWS: !Ref BucketAdminArn
            Action: 's3:*'
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
          - Sid: WriterAccess
            Effect: Allow
            Principal:
              AWS: !Ref BucketWriterArn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
          - Sid: DenyNonVpcAccess
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
            Condition:
              StringNotEquals:
                aws:SourceVpc:
                  Fn::ImportValue: !Sub "${VpcStackName}-VpcId"
                aws:PrincipalAccount: !Ref AccountId


Outputs:
  BucketName:
    Value: !Ref S3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"
  BucketArn:
    Value: !GetAtt S3Bucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"
  BucketDomainName:
    Value: !GetAtt S3Bucket.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-BucketDomainName"
  # -- How downstream stacks consume this stack's outputs ------------------
  # A downstream stack (EC2, ECS, Lambda) can reference this bucket like this:
  #
  #   Parameters:
  #     S3StackName:
  #       Type: String
  #       Default: "poc-NEW-s3-dev"
  #   Resources:
  #     MyFunction:
  #       Properties:
  #         Environment:
  #           Variables:
  #             BUCKET_ARN:
  #               Fn::ImportValue: !Sub "${S3StackName}-BucketArn"
  #
  # The VPC stack is referenced the same way (VpcStackName -> VpcId, SubnetIds, etc.)
  # The resolver supplies the correct stack name per account -- no hardcoding needed.
